name: VirtualBox Check Install
description: Ensure VBoxManage.exe exists and install VirtualBox with Chocolatey if needed.

inputs:
  preferred_vboxmanage_path:
    description: Preferred VBoxManage.exe path to probe first.
    required: false
    default: 'C:\Progra~1\Oracle\VirtualBox\VBoxManage.exe'
  fallback_vboxmanage_path:
    description: Fallback VBoxManage.exe path to probe before and after install.
    required: false
    default: 'C:\Program Files\Oracle\VirtualBox\VBoxManage.exe'
  choco_package_name:
    description: Chocolatey package name used when installation is required.
    required: false
    default: "virtualbox"
  install_arguments:
    description: Extra arguments passed to choco install.
    required: false
    default: "-y --no-progress"

outputs:
  vboxmanage_path:
    description: Resolved VBoxManage.exe path.
    value: ${{ steps.check.outputs.vboxmanage_path }}
  was_installed:
    description: Whether VirtualBox had to be installed.
    value: ${{ steps.check.outputs.was_installed }}

runs:
  using: composite
  steps:
    - id: check
      name: Check or install VirtualBox
      shell: powershell
      env:
        PREFERRED_VBOXMANAGE_PATH: ${{ inputs.preferred_vboxmanage_path }}
        FALLBACK_VBOXMANAGE_PATH: ${{ inputs.fallback_vboxmanage_path }}
        CHOCO_PACKAGE_NAME: ${{ inputs.choco_package_name }}
        INSTALL_ARGUMENTS: ${{ inputs.install_arguments }}
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Check-Install.ps1'
        & $scriptPath `
          -PreferredVBoxManagePath $env:PREFERRED_VBOXMANAGE_PATH `
          -FallbackVBoxManagePath $env:FALLBACK_VBOXMANAGE_PATH `
          -ChocoPackageName $env:CHOCO_PACKAGE_NAME `
          -InstallArguments $env:INSTALL_ARGUMENTS