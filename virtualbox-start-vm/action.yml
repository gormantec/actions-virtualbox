name: VirtualBox Start VM
description: Start the target VM in headless mode.

inputs:
  vm_name:
    description: Target VM name.
    required: false
    default: openclaw-vm
  vboxmanage_path:
    description: Path to VBoxManage.exe.
    required: false
    default: "C:\\Progra~1\\Oracle\\VirtualBox\\VBoxManage.exe"

runs:
  using: composite
  steps:
    - name: Start VM
      shell: powershell
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Start-VmIfRequested.ps1'
        & $scriptPath `
          -VmName '${{ inputs.vm_name }}' `
          -VBoxManagePath '${{ inputs.vboxmanage_path }}'
