name: "VirtualBox Reboot Guest"
description: "Reboot guest to trigger bootstrap service."

inputs:
  base_vm_user:
    description: "Existing guest user for guestcontrol auth."
    required: true
  base_vm_host_password:
    description: "Password for base guest user."
    required: true
  vm_name:
    description: "Target VM name."
    required: false
    default: "new-vm"
  vboxmanage_path:
    description: "Path to VBoxManage.exe."
    required: false
    default: "C:\\Progra~1\\Oracle\\VirtualBox\\VBoxManage.exe"
  offline_attempts:
    description: "Attempts to wait for VM to go offline."
    required: false
    default: 6
  offline_sleep_seconds:
    description: "Seconds to sleep between offline checks."
    required: false
    default: 5
  online_attempts:
    description: "Attempts to wait for VM to return online."
    required: false
    default: 24
  online_sleep_seconds:
    description: "Seconds to sleep between online checks."
    required: false
    default: 5

runs:
  using: "composite"
  steps:
    - name: "Reboot guest"
      shell: "powershell"
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Reboot-GuestToRunBootstrap.ps1'
        & $scriptPath `
          -VmName '${{ inputs.vm_name }}' `
          -BaseVmUser '${{ inputs.base_vm_user }}' `
          -BaseVmHostPassword '${{ inputs.base_vm_host_password }}' `
          -VBoxManagePath '${{ inputs.vboxmanage_path }}' `
          -OfflineAttempts ${{ inputs.offline_attempts }} `
          -OfflineSleepSeconds ${{ inputs.offline_sleep_seconds }} `
          -OnlineAttempts ${{ inputs.online_attempts }} `
          -OnlineSleepSeconds ${{ inputs.online_sleep_seconds }}