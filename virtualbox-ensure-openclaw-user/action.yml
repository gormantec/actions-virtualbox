name: VirtualBox Ensure OpenClaw User
description: Ensure OpenClaw user and hostname config inside guest.

inputs:
  base_vm_user:
    description: Existing guest user for guestcontrol auth.
    required: true
  vm_user:
    description: OpenClaw user to create/configure.
    required: true
  base_vm_host_password:
    description: Password for base guest user.
    required: true
  openclaw_vm_password:
    description: Password to assign to OpenClaw user.
    required: true
  vm_name:
    description: Target VM name.
    required: false
    default: new-vm
  vboxmanage_path:
    description: Path to VBoxManage.exe.
    required: false
    default: "C:\\Progra~1\\Oracle\\VirtualBox\\VBoxManage.exe"

runs:
  using: composite
  steps:
    - name: Ensure user
      shell: powershell
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Ensure-OpenClawUser.ps1'
        & $scriptPath `
          -VmName '${{ inputs.vm_name }}' `
          -BaseVmUser '${{ inputs.base_vm_user }}' `
          -OpenClawUser '${{ inputs.vm_user }}' `
          -BaseVmHostPassword '${{ inputs.base_vm_host_password }}' `
          -OpenClawVmPassword '${{ inputs.openclaw_vm_password }}' `
          -VBoxManagePath '${{ inputs.vboxmanage_path }}'