name: "VirtualBox Configure Bootstrap"
description: "Upload and configure guest bootstrap files."

inputs:
  base_vm_user:
    description: "Existing guest user for guestcontrol auth."
    required: true
  vm_user:
    description: "User to write into env."
    required: true
  config_repo:
    description: "Repo containing install assets."
    required: true
  config_ref:
    description: "Git ref for install assets."
    required: true
  install_script_path:
    description: "Path in config_repo for the install script."
    required: false
    default: "bootstrap_install.sh"
  base_vm_host_password:
    description: "Password for base guest user."
    required: true
  bootstrap_install_env_b64:
    description: "Base64 encoded env file."
    required: true
  github_token:
    description: "GitHub token for API download."
    required: true
  github_copilot_token:
    description: "GitHub Copilot token for copilot models."
    required: true
  github_bridge_token:
    description: "GitHub Copilot token for copilot models."
    required: true
  gemini_token:
    description: "Gemini token for genini models."
    required: true
  cloudflare_tunnel_token:
    description: "cloudflare tunnel token for web access."
    required: true
  vm_name:
    description: "Target VM name."
    required: true
    default: "new-vm"
  vboxmanage_path:
    description: "Path to VBoxManage.exe."
    required: false
    default: "C:\\Progra~1\\Oracle\\VirtualBox\\VBoxManage.exe"

runs:
  using: "composite"
  steps:
    - name: "Configure bootstrap"
      shell: "powershell"
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Configure-Bootstrap.ps1'
        & $scriptPath `
          -VmName '${{ inputs.vm_name }}' `
          -BaseVmUser '${{ inputs.base_vm_user }}' `
          -VmUser '${{ inputs.vm_user }}' `
          -ConfigRepo '${{ inputs.config_repo }}' `
          -ConfigRef '${{ inputs.config_ref }}' `
          -BootstrapRepo "${{ github.action_repository || 'gormantec/actions-virtualbox' }}" `
          -BootstrapRef "${{ github.action_ref || 'main' }}" `
          -InstallScriptPath '${{ inputs.install_script_path }}' `
          -BaseVmHostPassword '${{ inputs.base_vm_host_password }}' `
          -BootstrapInstallEnvB64 '${{ inputs.bootstrap_install_env_b64 }}' `
          -GitHubToken '${{ inputs.github_token }}' `
          -GitHubCopilotToken '${{ inputs.github_copilot_token }}' `
          -GitHubBridgeToken '${{ inputs.github_bridge_token }}' `
          -GeminiToken '${{ inputs.gemini_token }}' `
          -CloudflareTunnelToken '${{ inputs.cloudflare_tunnel_token }}' `
          -VBoxManagePath '${{ inputs.vboxmanage_path }}'
