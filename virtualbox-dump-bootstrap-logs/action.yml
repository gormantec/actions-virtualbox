name: VirtualBox Dump Bootstrap Logs
description: Follow and dump guest bootstrap logs until completion.

inputs:
  base_vm_user:
    description: Existing guest user for guestcontrol auth.
    required: true
  base_vm_host_password:
    description: Password for base guest user.
    required: true
  vm_name:
    description: Target VM name.
    required: false
    default: new-vm
  vboxmanage_path:
    description: Path to VBoxManage.exe.
    required: false
    default: "C:\\Progra~1\\Oracle\\VirtualBox\\VBoxManage.exe"
  follow_attempts:
    description: Number of log follow attempts.
    required: false
    default: 100
  follow_sleep_seconds:
    description: Seconds to sleep between log follow attempts.
    required: false
    default: 20
  max_stale:
    description: Max stale attempts before considering log complete if service is inactive.
    required: false
    default: 5

runs:
  using: composite
  steps:
    - name: Dump logs
      shell: powershell
      run: |
        $scriptPath = Join-Path '${{ github.action_path }}' '..\scripts\virtualbox\Dump-BootstrapLogs.ps1'
        & $scriptPath `
          -VmName '${{ inputs.vm_name }}' `
          -BaseVmUser '${{ inputs.base_vm_user }}' `
          -BaseVmHostPassword '${{ inputs.base_vm_host_password }}' `
          -VBoxManagePath '${{ inputs.vboxmanage_path }}' `
          -FollowAttempts ${{ inputs.follow_attempts }} `
          -FollowSleepSeconds ${{ inputs.follow_sleep_seconds }} `
          -MaxStale ${{ inputs.max_stale }}